<!DOCTYPE html>
<html>
<head>
<title>zoiweb</title>

<link rel="icon" href="https://lh3.googleusercontent.com/d/12GeMA0IESDyDULD8Gr3E5hHF7qJ6WlqE" />
<link rel="manifest" href="/manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Google Identity Services -->
<meta name="google-signin-client_id" content="133241587948-6gq6k87p1r4d5jhjc9068m1gcnvtkoge.apps.googleusercontent.com">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="ZOIWEB is a small and local platform that strives to provide a diverse range of services such as e-commerce, education, and matrimonial services tailored to your specific needs.">
<meta name="keywords" content="zoiweb">
<meta name="author" content="Virendra Koli">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<style>
body { margin:0; font-family: Arial; }

.responsive-iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

#installPopup {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  padding: 15px 20px;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  display: none;
  z-index: 9999;
  text-align: center;
}

#installPopup button {
  margin-top: 10px;
  padding: 8px 14px;
  border: none;
  background: #007bff;
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
}

#closeBtn {
  background: #ccc;
  margin-left: 10px;
}
</style>
</head>
<body>

<div id="installPopup">
  <div>Install ZoiWeb App on Desktop?</div>
  <button id="installBtn">Install</button>
  <button id="closeBtn">Later</button>
</div>

<div class="d-flex flex-column vh-100">

  <!-- Top Section with Logo -->
  <header class="text-center py-3 border-bottom border-primary d-flex flex-column align-items-center">
    <img src="https://lh3.googleusercontent.com/d/1BdpLKvdtGTmWCpU0JeCntNOjIO0MNjxX" 
         alt="ZoiWeb Logo" 
         class="mb-2" 
         style="max-height: 60px; width: auto;">
    <h6 class="mb-0">Welcome to zoiweb</h6>
  </header>


  <!-- Middle Section (Cards) -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="container">
      <div class="row justify-content-center g-3 text-center">

        <!-- Koli Community -->
        <div class="col-6 col-sm-6 col-md-4 col-lg-3">
          <div class="card top-card p-3 shadow-sm h-100 border border-primary" style="cursor: pointer">
            <div class="icon-box mb-2 text-primary">
              <i class="fas fa-users fa-2x"></i>
            </div>
            <h6 class="mb-0 text-primary">Koli</h6>
            <small>Community</small>
          </div>
        </div>

        <!-- E-commerce -->
        <div class="col-6 col-sm-6 col-md-4 col-lg-3">
          <div class="card p-3 shadow-sm h-100 text-secondary" style="cursor: pointer">
            <div class="icon-box mb-2">
              <i class="fas fa-shopping-cart fa-2x"></i>
            </div>
            <h6 class="mb-0">E-commerce</h6>
            <small class="text-muted">Coming Soon</small>
          </div>
        </div>

        <!-- Jobs -->
        <div class="col-6 col-sm-6 col-md-4 col-lg-3">
          <div class="card p-3 shadow-sm h-100 text-secondary" style="cursor: pointer">
            <div class="icon-box mb-2">
              <i class="fas fa-briefcase fa-2x"></i>
            </div>
            <h6 class="mb-0">Jobs</h6>
            <small class="text-muted">Coming Soon</small>
          </div>
        </div>

        <!-- Education -->
        <div class="col-6 col-sm-6 col-md-4 col-lg-3">
          <div class="card p-3 shadow-sm h-100 text-secondary" style="cursor: pointer">
            <div class="icon-box mb-2">
              <i class="fas fa-book fa-2x"></i>
            </div>
            <h6 class="mb-0">Education</h6>
            <small class="text-muted">Coming Soon</small>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Bottom Section -->
  <footer class="text-center py-3 bg-light shadow-sm">
    <small>&copy; <span id="year"></span> ZoiWeb Services. All rights reserved.</small>
  </footer>

</div>

<script>
  // Automatically set current year
  document.getElementById('year').textContent = new Date().getFullYear();
</script>

<script>
let deferredPrompt;
const popup = document.getElementById('installPopup');
const installBtn = document.getElementById('installBtn');
const closeBtn = document.getElementById('closeBtn');

// Detect install availability
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  setTimeout(() => {
    popup.style.display = 'block';
  }, 2000);
});

// Install click
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;

  popup.style.display = 'none';
  deferredPrompt = null;
});

// Close popup
closeBtn.addEventListener('click', () => {
  popup.style.display = 'none';
});

// After install → auto fullscreen launch
window.addEventListener('appinstalled', () => {
  console.log('App Installed');

  // छोटा delay ताकि install complete हो जाए
  setTimeout(() => {
    // नया window open (PWA mode में fullscreen जैसा feel देगा)
    window.open(window.location.href, '_blank');
  }, 1000);
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

<style>
.card {
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

</style>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/3561c44a4b.js" crossorigin="anonymous"></script>

</body>
</html>
