<!DOCTYPE html>
<html>
<head>
<title>zoiweb</title>

<link rel="icon" href="https://lh3.googleusercontent.com/d/12GeMA0IESDyDULD8Gr3E5hHF7qJ6WlqE" />
<link rel="manifest" href="/manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Google Identity Services -->
<meta name="google-signin-client_id" content="133241587948-6gq6k87p1r4d5jhjc9068m1gcnvtkoge.apps.googleusercontent.com">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="ZOIWEB is a small and local platform that strives to provide a diverse range of services such as e-commerce, education, and matrimonial services tailored to your specific needs.">
<meta name="keywords" content="zoiweb">
<meta name="author" content="Virendra Koli">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<style>
body { margin:0; font-family: Arial; }

.responsive-iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}


</style>
</head>
<body>

<!-- Modal -->
<div class="modal fade" id="installAppModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content bg-body-tertiary text-body text-center">
      <div class="modal-header border-secondary">
        <h6 class="modal-title w-100" id="installAppModalTitle">
          Do you want to install zoiweb app ?
        </h6>
      </div>
      <div class="modal-body">
        <button id="installBtnModal" class="btn btn-primary">Install</button>
        <button id="closeBtnModal" class="btn btn-secondary">Later</button>
      </div>
    </div>
  </div>
</div>
<div class="d-flex flex-column vh-100">

  <!-- Top Section with Logo -->
  <header class="text-center py-3 border-bottom border-primary d-flex flex-column align-items-center">
    <img src="https://lh3.googleusercontent.com/d/1BdpLKvdtGTmWCpU0JeCntNOjIO0MNjxX" 
         alt="ZoiWeb Logo" 
         class="mb-2" 
         style="max-height: 60px; width: auto;">
    <h6 class="mb-0">Welcome to zoiweb</h6>
  </header>


  <!-- Middle Section (Cards) -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="container">
      <div class="row justify-content-center g-3 text-center">

        <!-- Koli Community -->
        <div class="col-6 col-sm-6 col-md-4 col-lg-3">
          <a href="https://zoiweb.in/Koli-Samaj-Community.html" style="text-decoration: none;">
            <div class="card top-card p-3 shadow-sm h-100 border border-primary" style="cursor: pointer">
              <div class="icon-box mb-2 text-primary">
                <i class="fas fa-users fa-2x"></i>
              </div>
              <h6 class="mb-0 text-primary">Koli</h6>
              <small>Community</small>
            </div>
          </a>
        </div>

        <!-- E-commerce -->
        <div class="col-6 col-sm-6 col-md-4 col-lg-3">
          <div class="card p-3 shadow-sm h-100 text-secondary" style="cursor: pointer">
            <div class="icon-box mb-2">
              <i class="fas fa-shopping-cart fa-2x"></i>
            </div>
            <h6 class="mb-0">E-commerce</h6>
            <small class="text-muted">Coming Soon...</small>
          </div>
        </div>

        <!-- Jobs -->
        <div class="col-6 col-sm-6 col-md-4 col-lg-3">
          <div class="card p-3 shadow-sm h-100 text-secondary" style="cursor: pointer">
            <div class="icon-box mb-2">
              <i class="fas fa-briefcase fa-2x"></i>
            </div>
            <h6 class="mb-0">Jobs</h6>
            <small class="text-muted">Coming Soon...</small>
          </div>
        </div>

        <!-- Education -->
        <div class="col-6 col-sm-6 col-md-4 col-lg-3">
          <div class="card p-3 shadow-sm h-100 text-secondary" style="cursor: pointer">
            <div class="icon-box mb-2">
              <i class="fas fa-book fa-2x"></i>
            </div>
            <h6 class="mb-0">Education</h6>
            <small class="text-muted">Coming Soon...</small>
          </div>
        </div>

      </div>
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/3561c44a4b.js" crossorigin="anonymous"></script>

<script>
let deferredPrompt;

// Bootstrap modal instance
const installModalEl = document.getElementById('installAppModal');
const installModal = new bootstrap.Modal(installModalEl);
const installBtnModal = document.getElementById('installBtnModal');
const closeBtnModal = document.getElementById('closeBtnModal');

// Detect install availability
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  // Show Bootstrap modal instead of custom popup
  setTimeout(() => {
    installModal.show();
  }, 2000);
});

// Install button click
installBtnModal.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;

  installModal.hide();
  deferredPrompt = null;
});

// Close button click
closeBtnModal.addEventListener('click', () => {
  installModal.hide();
});

// After install → auto fullscreen launch
window.addEventListener('appinstalled', () => {
  console.log('App Installed');

  setTimeout(() => {
    window.open(window.location.href, '_blank');
  }, 1000);
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

<style>
.card {
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

</style>


</body>
</html>
